<div class="form-group">
    <label for="message">Напиши, что чувствуешь</label>
    <textarea id="message" name="message" 
        placeholder="Можно просто написать о том, что происходит. Любыми словами." 
        rows="6" maxlength="1000"></textarea>
    <div class="char-counter">
        <span id="charCount">0</span>/1000 символов
    </div>
</div>


<div id="formNotification" class="notification" style="display: none;"></div>
